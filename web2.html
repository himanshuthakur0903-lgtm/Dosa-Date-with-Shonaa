<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Go for DOSA Date? 🌯❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            overflow: hidden;
            position: relative;
        }
        
        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            animation: float 6s infinite linear;
            color: #ff69b4;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        
        .container {
            text-align: center;
            z-index: 10;
            max-width: 400px;
            padding: 40px 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: bounceIn 1s ease-out;
        }
        
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        h1 {
            font-size: 2.5em;
            color: #e91e63;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .question {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 40px;
            line-height: 1.4;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .yes-btn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }
        
        .yes-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(76, 175, 80, 0.4);
        }
        
        .no-btn {
            background: linear-gradient(45deg, #f44336, #da190b);
            color: white;
        }
        
        .no-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(244, 67, 54, 0.4);
        }
        
        .plead {
            font-size: 1.5em;
            color: #e91e63;
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .success {
            background: linear-gradient(45deg, #4CAF50, #8BC34A) !important;
            color: white;
            font-size: 1.4em;
            padding: 30px;
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 2em; }
            .question { font-size: 1.1em; }
            button { padding: 12px 25px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container" id="container">
        <h1> Dosa Date? </h1>
        <div class="question" id="question">
            Hey beautiful! Will you go on a super special <br>
            <strong>DO SA DATE</strong> with me this weekend? 🥰
        </div>
        <div class="buttons">
            <button class="yes-btn" onclick="showSuccess()">Yes! 😍</button>
            <button class="no-btn" onclick="nextPlead()">No 😢</button>
        </div>
    </div>

    <script>
        const pickupLines = [
            "Pleaseeee 🥺❤️ Just one dosa date!",
            "Aree yaar, dosa to banta hai! 🥰",
            "Your smile + masala dosa = perfect combo! 😍",
            "Main aur tu, dosa aur chutney! 💕",
            "One date = unlimited happiness! 🥳",
            "Dosa date kar lo, Himashu ke saath! 😉",
            "Please say yes, dil toot jayega! 😭❤️",
            "Dosa without you is just a pancake! 🥺",
            "Bas ek chance do naaa! 🌯💖",
            "You're my favorite topping! 🥰"
        ];
        
        let currentPlead = 0;
        
        function createHearts() {
            const heartsContainer = document.getElementById('hearts');
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = ['❤️', '💖', '💕', '💗', '😍'][Math.floor(Math.random()*5)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random()*3 + 3) + 's';
                    heartsContainer.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 7000);
                }, i * 300);
            }
        }
        
        function nextPlead() {
            currentPlead++;
            const container = document.getElementById('container');
            const question = document.getElementById('question');
            
            if(currentPlead >= pickupLines.length) {
                question.innerHTML = "Okay okay! I surrender! 😅<br>Just one tiny dosa date? 🥺";
            } else {
                question.innerHTML = pickupLines[currentPlead];
            }
            
            container.style.animation = 'bounceIn 0.5s ease-out';
            setTimeout(() => container.style.animation = '', 500);
            createHearts();
        }
        
        function showSuccess() {
            document.body.style.background = 'linear-gradient(135deg, #4CAF50, #8BC34A)';
            document.querySelector('.container').innerHTML = `
                <h1>🎉 YESSS! 🎉</h1>
                <div class="question success">
                    YAYYY! I knew you'd say yes! 🥰<br><br>
                    <strong> Toh Theek hai ab jab Aap kaho</strong><br>
                    tab hum <strong>Sundaram chlenge aapka favorite dosa spot</strong> 🌯✨<br><br>
                    Can't wait to see you! 😍❤️
         Thankyouu Shonaaa you are the bestest 
         I love youuuuuuuuu muaaah
                </div>
            `;
            for(let i = 0; i < 50; i++) {
                setTimeout(createHearts, i * 100);
            }
        }
        
        // Start with some hearts
        createHearts();
        setInterval(createHearts, 5000);
    </script>
</body>
</html>
